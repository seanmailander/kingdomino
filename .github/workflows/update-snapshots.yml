# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Update CI Snapshots

on:
  workflow_dispatch:

jobs:
  build-client:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          # Value already defaults to true, but `persist-credentials` is required to push new commits to the repository.
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - run: npm ci
      - run: npx playwright install --with-deps chromium
        working-directory: packages/client
      - run: npm run build --if-present
        working-directory: packages/client
      - run: npm run test:update-snapshots
        working-directory: packages/client
      - name: Commit and push updated snapshots
        if: ${{ always() }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update client snapshots"
          file_pattern: "packages/client/__vis__/**/__baselines__/**/*"
          branch: ci-update-snapshots
          create_branch: true
